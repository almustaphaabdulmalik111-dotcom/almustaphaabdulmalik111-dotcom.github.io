<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopVerse</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:#0f172a;
color:white;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:30px;
font-weight:bold;
color:#00d4ff;
}

nav a{
color:white;
text-decoration:none;
margin-left:20px;
}

.hero{
text-align:center;
padding:80px 20px;
background:white;
}

.hero h1{
font-size:40px;
color:#111;
}

.hero p{
margin:20px 0;
font-size:18px;
color:#555;
}

.button{
display:inline-block;
padding:15px 30px;
background:#00d4ff;
color:white;
text-decoration:none;
border-radius:8px;
font-weight:bold;
}

footer{
background:#0f172a;
color:white;
text-align:center;
padding:20px;
margin-top:60px;
}
</style>
</head>

<body>

<header>
<div class="logo">ShopVerse</div>

<nav>
<a href="#">Home</a>
<a href="#">Products</a>
<a href="#">Categories</a>
<a href="#">Contact</a>
</nav>
</header>

<section class="hero">
<h1>Welcome to ShopVerse</h1>
<p>Your one-stop online shopping destination.</p>

<a href="#" class="button">Shop Now</a>
</section>

<footer>
© 2026 ShopVerse. All Rights Reserved.
</footer>

</body>
</html>
