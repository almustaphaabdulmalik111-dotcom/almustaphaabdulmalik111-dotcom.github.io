<!DOCTYPE html>
<html>
<head>
<title>ShopVerse</title>

<style>
body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

header{
background:#111827;
color:white;
padding:20px;
display:flex;
justify-content:space-between;
}

.logo{
font-size:28px;
color:#00d4ff;
font-weight:bold;
}

nav a{
color:white;
margin:10px;
text-decoration:none;
}

.hero{
background:white;
text-align:center;
padding:60px 20px;
}

.hero h1{
font-size:40px;
}

.btn{
background:#00d4ff;
color:white;
padding:12px 25px;
border-radius:20px;
text-decoration:none;
}

.products{
padding:30px;
display:flex;
gap:20px;
flex-wrap:wrap;
justify-content:center;
}

.card{
background:white;
padding:20px;
width:220px;
border-radius:10px;
text-align:center;
box-shadow:0 0 10px #ccc;
}

.card button{
background:#111827;
color:white;
border:0;
padding:10px;
border-radius:5px;
}

footer{
background:#111827;
color:white;
text-align:center;
padding:20px;
}
</style>

</head>

<body>

<header>

<div class="logo">ShopVerse</div>

<nav>
<a href="#">Home</a>
<a href="#">Products</a>
<a href="#">Contact</a>
</nav>

</header>


<section class="hero">

<h1>Welcome to ShopVerse</h1>

<p>Your online marketplace for amazing products.</p>

<a class="btn" href="#">Shop Now</a>

</section>


<h2 style="text-align:center;">Featured Products</h2>


<section class="products">

<div class="card">
<h3>Smart Phone</h3>
<p>$299</p>
<button>Add to Cart</button>
</div>


<div class="card">
<h3>Headphones</h3>
<p>$50</p>
<button>Add to Cart</button>
</div>


<div class="card">
<h3>Smart Watch</h3>
<p>$80</p>
<button>Add to Cart</button>
</div>


</section>


<footer>
© 2026 ShopVerse
</footer>


</body>
</html>
